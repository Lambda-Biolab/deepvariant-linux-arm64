# Lint and type check for all Python code.
# Runs on all pushes and PRs (including docs-only changes that touch .py files).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.10

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Lint with ruff
        run: uv run ruff check scripts/*.py deepvariant/ --output-format=github

      - name: Type check with pyright
        run: uv run pyright
